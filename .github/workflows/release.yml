name: release

# Tag-triggered release. Push `v*` and this workflow builds the Windows
# installer + macOS .dmg, signs the updater bundles with the Tauri
# updater key, and publishes everything to a GitHub Release including
# a `latest.json` manifest the agent's auto-updater pulls from
# `releases/latest/download/latest.json`.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.tauri/badgebadger.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — empty if the key has no password
#
# Architecture: a matrix `build` job produces platform-specific bundles
# and uploads them as workflow artifacts. A follow-on `finalize` job
# (Ubuntu, fast) downloads both, constructs `latest.json` with entries
# for every platform, creates the GitHub release, and uploads everything
# at once. This keeps latest.json atomic — operators never see a
# half-published release that mentions only one platform.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows
            artifact_name: build-windows
          - runner: macos-latest
            platform: macos
            artifact_name: build-macos
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch SumatraPDF (Windows only)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/fetch-sumatra.ps1

      # --- WINDOWS BUILD ---------------------------------------------
      - name: Tauri build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles msi,nsis,updater

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msiDir  = "src-tauri/target/release/bundle/msi"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          function FindOne($dir, $suffix) {
            Get-ChildItem -Path $dir -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*${suffix}" } |
              Select-Object -First 1
          }

          $exe = FindOne $nsisDir "_${version}_x64-setup.exe"
          $msi = FindOne $msiDir  "_${version}_x64_en-US.msi"
          $zip = FindOne $nsisDir "_${version}_x64-setup.nsis.zip"
          $sig = FindOne $nsisDir "_${version}_x64-setup.nsis.zip.sig"

          $missing = @()
          if (-not $exe) { $missing += "nsis .exe" }
          if (-not $msi) { $missing += "msi" }
          if (-not $zip) { $missing += "nsis.zip" }
          if (-not $sig) { $missing += "nsis.zip.sig" }
          if ($missing.Count -gt 0) {
            Write-Host ("missing artifacts: {0}" -f ($missing -join ", "))
            Get-ChildItem $nsisDir -File -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  nsis $($_.Name)" }
            Get-ChildItem $msiDir -File -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  msi $($_.Name)" }
            exit 1
          }

          Copy-Item $exe.FullName "artifacts/BadgeBadger.Print.Agent_${version}_x64-setup.exe"
          Copy-Item $msi.FullName "artifacts/BadgeBadger.Print.Agent_${version}_x64_en-US.msi"
          Copy-Item $zip.FullName "artifacts/BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip"
          Copy-Item $sig.FullName "artifacts/BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip.sig"

      # --- MACOS BUILD -----------------------------------------------
      - name: Tauri build (macOS)
        if: matrix.platform == 'macos'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles app,dmg,updater

      - name: Stage macOS artifacts
        if: matrix.platform == 'macos'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          macos_dir="src-tauri/target/release/bundle/macos"
          dmg_dir="src-tauri/target/release/bundle/dmg"
          mkdir -p artifacts

          # macOS arch detection: macos-latest runners are arm64 (M-series)
          # right now. We surface this in the bundled filename + latest.json
          # platform key so future Intel-runner additions don't collide.
          arch="$(uname -m)"
          platform_key="darwin-${arch}"
          # Tauri's bundler uses `aarch64` in some filenames and the runner
          # arch returns `arm64`; normalise both into our published name.
          published_arch="$arch"

          # Locate artifacts. Tauri writes `<ProductName>_<version>_<arch>.dmg`
          # and `<ProductName>.app.tar.gz` + `.sig` for the updater bundle.
          dmg=$(find "$dmg_dir" -maxdepth 1 -name "*_${version}_*.dmg" | head -n1 || true)
          tarball=$(find "$macos_dir" -maxdepth 1 -name "*.app.tar.gz" | head -n1 || true)
          sig=$(find "$macos_dir" -maxdepth 1 -name "*.app.tar.gz.sig" | head -n1 || true)

          missing=()
          [ -z "${dmg:-}" ] && missing+=(".dmg")
          [ -z "${tarball:-}" ] && missing+=(".app.tar.gz")
          [ -z "${sig:-}" ] && missing+=(".app.tar.gz.sig")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "missing artifacts: ${missing[*]}"
            ls -la "$macos_dir" 2>/dev/null || true
            ls -la "$dmg_dir" 2>/dev/null || true
            exit 1
          fi

          # Stable filenames so `releases/latest/download/...` URLs stay
          # consistent across releases.
          cp "$dmg"     "artifacts/BadgeBadger.Print.Agent_${version}_${published_arch}.dmg"
          cp "$tarball" "artifacts/BadgeBadger.Print.Agent_${version}_${published_arch}.app.tar.gz"
          cp "$sig"     "artifacts/BadgeBadger.Print.Agent_${version}_${published_arch}.app.tar.gz.sig"

          # Record the platform key + signature for the finalize job.
          {
            echo "platform_key=${platform_key}"
            echo "arch=${published_arch}"
          } > artifacts/macos.meta

      # --- COMMON ----------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (needed for nothing but quiet errors)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming

      - name: Construct latest.json + publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"

          win_dir="incoming/build-windows"
          mac_dir="incoming/build-macos"

          # Signatures live next to the bundles after the matrix copy.
          win_zip="${win_dir}/BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip"
          win_sig="${win_dir}/BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip.sig"
          win_exe="${win_dir}/BadgeBadger.Print.Agent_${version}_x64-setup.exe"
          win_msi="${win_dir}/BadgeBadger.Print.Agent_${version}_x64_en-US.msi"

          # Read macOS arch from the side-channel meta file.
          mac_arch=""
          if [ -f "${mac_dir}/macos.meta" ]; then
            mac_arch="$(grep '^arch=' "${mac_dir}/macos.meta" | cut -d= -f2)"
          fi
          mac_dmg=""
          mac_tar=""
          mac_sig=""
          if [ -n "$mac_arch" ]; then
            mac_dmg="${mac_dir}/BadgeBadger.Print.Agent_${version}_${mac_arch}.dmg"
            mac_tar="${mac_dir}/BadgeBadger.Print.Agent_${version}_${mac_arch}.app.tar.gz"
            mac_sig="${mac_dir}/BadgeBadger.Print.Agent_${version}_${mac_arch}.app.tar.gz.sig"
          fi

          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          # Build platforms map progressively so we can ship Windows-only
          # if the macOS leg ever skips (and vice versa).
          platforms="{}"

          if [ -f "$win_sig" ] && [ -f "$win_zip" ]; then
            win_signature="$(tr -d '\n' < "$win_sig")"
            platforms="$(echo "$platforms" | jq --arg sig "$win_signature" --arg url "https://github.com/${REPO}/releases/download/${TAG}/$(basename "$win_zip")" \
              '. + {"windows-x86_64": {signature: $sig, url: $url}}')"
          fi

          if [ -n "$mac_arch" ] && [ -f "$mac_sig" ] && [ -f "$mac_tar" ]; then
            mac_signature="$(tr -d '\n' < "$mac_sig")"
            # macOS arch maps: arm64 → darwin-aarch64, x86_64 → darwin-x86_64.
            case "$mac_arch" in
              arm64|aarch64) key="darwin-aarch64" ;;
              x86_64)        key="darwin-x86_64" ;;
              *)             key="darwin-${mac_arch}" ;;
            esac
            platforms="$(echo "$platforms" | jq --arg key "$key" --arg sig "$mac_signature" --arg url "https://github.com/${REPO}/releases/download/${TAG}/$(basename "$mac_tar")" \
              '. + {($key): {signature: $sig, url: $url}}')"
          fi

          jq -n --arg version "$version" --arg notes "v${version}" --arg pub_date "$pub_date" --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          echo "latest.json:"
          cat latest.json

          # Create the release if it doesn't exist, then upload everything.
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "BadgeBadger Print Agent $TAG" \
              --notes "See CHANGELOG.md for what's new. Auto-applied via the in-app update banner."
          fi

          upload_args=("$TAG")
          [ -f "$win_exe" ] && upload_args+=("$win_exe")
          [ -f "$win_msi" ] && upload_args+=("$win_msi")
          [ -f "$win_zip" ] && upload_args+=("$win_zip")
          [ -f "$mac_dmg" ] && upload_args+=("$mac_dmg")
          [ -f "$mac_tar" ] && upload_args+=("$mac_tar")
          upload_args+=("latest.json")

          gh release upload "${upload_args[@]}" --repo "$REPO" --clobber
