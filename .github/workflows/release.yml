name: release

# Tag-triggered release. Push `v0.2.0` (or any `v*`) and this workflow
# builds the Windows MSI + NSIS installer, signs the update bundle with
# the Tauri updater key, and publishes everything as a GitHub Release —
# including the `latest.json` manifest the agent's auto-updater pulls
# from `releases/latest/download/latest.json`.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.tauri/badgebadger.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — empty if the key has no password

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch SumatraPDF (bundled into MSI)
        shell: pwsh
        run: ./scripts/fetch-sumatra.ps1

      - name: Build + sign + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The action picks up the tag and creates a GitHub Release
          # named after it. `__VERSION__` is replaced with the tag's
          # version (without the leading `v`).
          tagName: ${{ github.ref_name }}
          releaseName: "BadgeBadger Print Agent v__VERSION__"
          releaseBody: |
            See `CHANGELOG.md` for what's new. This release is auto-applied
            by agents already running v0.1.0+ via the in-app update banner.
          releaseDraft: false
          prerelease: false
          # Generates `latest.json` from the build output and uploads it
          # as a release asset alongside the installers. The agent's
          # `tauri.conf.json` points at `releases/latest/download/latest.json`
          # so this is what gets fetched on every update check.
          includeUpdaterJson: true
