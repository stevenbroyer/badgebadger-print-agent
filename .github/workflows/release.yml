name: release

# Tag-triggered release. Push `v0.2.0` (or any `v*`) and this workflow
# builds the Windows MSI + NSIS installer, signs the update bundle with
# the Tauri updater key, and publishes everything as a GitHub Release —
# including the `latest.json` manifest the agent's auto-updater pulls
# from `releases/latest/download/latest.json`.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.tauri/badgebadger.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — empty if the key has no password

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch SumatraPDF (bundled into MSI)
        shell: pwsh
        run: ./scripts/fetch-sumatra.ps1

      - name: Build + sign + release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The action picks up the tag and creates a GitHub Release
          # named after it. `__VERSION__` is replaced with the tag's
          # version (without the leading `v`).
          tagName: ${{ github.ref_name }}
          releaseName: "BadgeBadger Print Agent v__VERSION__"
          releaseBody: |
            See `CHANGELOG.md` for what's new. This release is auto-applied
            by agents already running v0.2.2+ via the in-app update banner.
          releaseDraft: false
          prerelease: false
          # tauri-action@v0's `includeUpdaterJson` historically skips the
          # upload with "Signature not found for the updater JSON" when it
          # can't auto-match the .sig file to the bundle. We construct
          # latest.json by hand in the next step instead, so leave this off.
          includeUpdaterJson: false

      # Build latest.json + upload bundle/sig assets for the Tauri auto-
      # updater. `tauri.conf.json` points the updater at
      # `releases/latest/download/latest.json`. Without this step the
      # update endpoint 404s and existing operators silently never see new
      # versions (matching what happened between v0.2.0 → v0.2.1).
      - name: Generate + upload updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v', ''
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          # Use -like via Where-Object — `Get-ChildItem -Filter` uses the
          # Windows file-system matcher which behaves unpredictably with
          # filenames containing spaces (Tauri produces e.g.
          # `BadgeBadger Print Agent_0.3.0_x64-setup.nsis.zip`).
          $all = Get-ChildItem -Path $bundleDir -File -ErrorAction SilentlyContinue
          $bundle = $all | Where-Object { $_.Name -like "*_${version}_x64-setup.nsis.zip" } | Select-Object -First 1
          $sigFile = $all | Where-Object { $_.Name -like "*_${version}_x64-setup.nsis.zip.sig" } | Select-Object -First 1
          if (-not $bundle -or -not $sigFile) {
            Write-Host ("files in {0}:" -f $bundleDir)
            $all | ForEach-Object { Write-Host "  $($_.Name)" }
            Write-Error "couldn't find bundle (.nsis.zip) and signature (.nsis.zip.sig)"
            exit 1
          }
          $signature = Get-Content -Raw $sigFile.FullName

          # Stable filenames so the GitHub `releases/latest/download/...`
          # redirect URL doesn't bake in the version.
          $bundleAsset = "BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip"
          Copy-Item $bundle.FullName $bundleAsset

          $manifest = @{
            version = $version
            notes = "v${version}"
            pub_date = (Get-Date -AsUTC).ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://github.com/${env:GITHUB_REPOSITORY}/releases/download/${env:TAG}/${bundleAsset}"
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path "latest.json" -Value $manifest -NoNewline

          gh release upload "$env:TAG" "$bundleAsset" "latest.json" --repo "$env:GITHUB_REPOSITORY" --clobber
