name: release

# Tag-triggered release. Push `v0.2.0` (or any `v*`) and this workflow
# builds the Windows MSI + NSIS installer, signs the update bundle with
# the Tauri updater key, and publishes everything as a GitHub Release —
# including the `latest.json` manifest the agent's auto-updater pulls
# from `releases/latest/download/latest.json`.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — contents of ~/.tauri/badgebadger.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — empty if the key has no password
#
# Why we don't use tauri-action: it scans the bundle dir, picks only the
# primary installer for each target, uploads those, and CLEANS UP the
# remaining files — including the `.nsis.zip` + `.sig` that the Tauri
# updater needs to consume. We need both the installer AND the updater
# bundle on the release, so we drive `tauri build` ourselves and manage
# the upload entirely from PowerShell.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch SumatraPDF (bundled into MSI)
        shell: pwsh
        run: ./scripts/fetch-sumatra.ps1

      - name: Tauri build (signed)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # `pnpm tauri build` produces the .msi + .exe + updater bundle
        # (`.nsis.zip` + `.sig`) when the signing key is present AND
        # `bundle.createUpdaterArtifacts` is set in tauri.conf.json. We
        # set both, plus pass `--bundles` explicitly as belt-and-
        # suspenders against future config drift.
        run: pnpm tauri build --bundles msi,nsis,updater

      - name: Publish release + updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msiDir  = "src-tauri/target/release/bundle/msi"

          # Match by suffix using `-like` — `Get-ChildItem -Filter` is
          # unreliable with filenames containing spaces (Tauri produces
          # e.g. `BadgeBadger Print Agent_0.3.1_x64-setup.nsis.zip`).
          function FindOne($dir, $suffix) {
            Get-ChildItem -Path $dir -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like "*${suffix}" } |
              Select-Object -First 1
          }

          $exe = FindOne $nsisDir "_${version}_x64-setup.exe"
          $msi = FindOne $msiDir  "_${version}_x64_en-US.msi"
          $zip = FindOne $nsisDir "_${version}_x64-setup.nsis.zip"
          $sig = FindOne $nsisDir "_${version}_x64-setup.nsis.zip.sig"
          $missing = @()
          if (-not $exe) { $missing += "nsis .exe" }
          if (-not $msi) { $missing += "msi" }
          if (-not $zip) { $missing += "nsis.zip" }
          if (-not $sig) { $missing += "nsis.zip.sig" }
          if ($missing.Count -gt 0) {
            Write-Host "missing artifacts: $($missing -join ', ')"
            Write-Host ("nsis dir ({0}):" -f $nsisDir)
            Get-ChildItem $nsisDir -File -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.Name)" }
            Write-Host ("msi dir ({0}):" -f $msiDir)
            Get-ChildItem $msiDir -File -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }

          # Stable filenames (no spaces) so `releases/latest/download/...`
          # URLs are clean.
          $exeAsset = "BadgeBadger.Print.Agent_${version}_x64-setup.exe"
          $msiAsset = "BadgeBadger.Print.Agent_${version}_x64_en-US.msi"
          $zipAsset = "BadgeBadger.Print.Agent_${version}_x64-setup.nsis.zip"
          Copy-Item $exe.FullName $exeAsset
          Copy-Item $msi.FullName $msiAsset
          Copy-Item $zip.FullName $zipAsset
          $signature = (Get-Content -Raw $sig.FullName).Trim()

          # Manifest the agent's updater pulls from
          # `releases/latest/download/latest.json`.
          $manifest = @{
            version  = $version
            notes    = "v${version}"
            pub_date = (Get-Date -AsUTC).ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = "https://github.com/${env:GITHUB_REPOSITORY}/releases/download/${env:TAG}/${zipAsset}"
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path "latest.json" -Value $manifest -NoNewline

          # Create the release (or refresh assets if it already exists).
          $existing = gh release view $env:TAG --repo "$env:GITHUB_REPOSITORY" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG `
              --repo "$env:GITHUB_REPOSITORY" `
              --title "BadgeBadger Print Agent $env:TAG" `
              --notes "See CHANGELOG.md for what's new. Auto-applied via the in-app update banner."
          }
          gh release upload $env:TAG `
            $exeAsset $msiAsset $zipAsset "latest.json" `
            --repo "$env:GITHUB_REPOSITORY" --clobber
